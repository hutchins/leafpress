<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded green background -->
  <rect width="100" height="100" rx="20" fill="#2e7d32"/>

  <!-- Simplified document -->
  <rect x="16" y="14" width="44" height="56" rx="6" fill="white"/>
  <!-- Folded corner -->
  <path d="M 44 14 L 60 30 H 44 Z" fill="#a5d6a7"/>
  <!-- Bold content lines (readable at small sizes) -->
  <rect x="26" y="40" width="24" height="6" rx="3" fill="#c8e6c9"/>
  <rect x="26" y="52" width="18" height="6" rx="3" fill="#c8e6c9"/>

  <!-- Bold leaf shape (simplified for favicon clarity) -->
  <path d="M 50 82 C 50 58, 66 42, 90 38 C 86 48, 80 56, 80 68 C 80 74, 76 80, 70 82 Z"
        fill="#66bb6a"/>
  <!-- Single bold vein -->
  <path d="M 52 80 C 62 66, 74 52, 88 40"
        stroke="white" stroke-width="2.5" fill="none" opacity="0.6"/>
</svg>
