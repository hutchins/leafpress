site_name: LeafPress
site_description: Convert MkDocs sites to PDF, Word, HTML, ODT, and EPUB documents with branding
site_url: https://leafpress.dev/
site_author: Shane Hutchins
docs_dir: docs

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Configuration: configuration.md
  - Usage:
    - CLI Reference: cli.md
    - Desktop UI: ui.md
  - Output Formats:
    - PDF Output: pdf.md
    - Word Output: docx.md
    - HTML Output: html.md
    - ODT Output: odt.md
    - EPUB Output: epub.md
  - Deployment:
    - CI / CD Pipelines: ci.md
    - Docker: docker.md
  - Customization:
    - Branding & Styling: branding.md
    - Git Integration: git-integration.md
    - Remote Sources: remote-sources.md
    - Diagrams: diagrams.md
  - Project:
    - About: about.md
    - Changelog: changelog.md

# Repository
repo_url: https://github.com/hutchins/leafpress
repo_name: leafpress

# Copyright
copyright: Copyright &copy; 2026 Shane Hutchins

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://leafpress.dev/
    - icon: fontawesome/brands/github
      link: https://github.com/hutchins/leafpress
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/leafpress/

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - codehilite
  - attr_list
  - meta
  - extra
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date
  - termynal
